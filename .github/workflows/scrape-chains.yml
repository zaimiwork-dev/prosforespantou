name: Scrape supermarket chains

# Runs the heavier adapters that exceed Vercel's 300s serverless timeout.
# Each schedule entry below maps to one job via `if: github.event.schedule`.
# Manual triggers via workflow_dispatch let us re-run any chain on demand.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DATABASE_URL   — Supabase pooler URL (port 6543, pgbouncer)
#   DIRECT_URL     — Direct Postgres URL (port 5432) for migrations
#   GROQ_API_KEY   — Groq Cloud key for LLM resolver
#
# Optional repo secrets:
#   SUPABASE_URL               — https://<ref>.supabase.co (project API URL)
#   SUPABASE_SERVICE_ROLE_KEY  — for mirroring AB product images to Supabase
#                                Storage (www.ab.gr 403s off-site fetches; see
#                                src/scripts/lib/mirror-images.mjs). Without
#                                these the AB run still works — images just
#                                stay broken and the run report warns.
#   PROXY_URL                  — residential proxy (http://user:pass@host:port)
#                                for chains whose host IP-blocks GitHub's
#                                datacenter ranges. Σκλαβενίτης (Akamai) needs
#                                it; without it the daily sklavenitis-offers job
#                                403s. See src/scripts/lib/proxy-fetch.mjs.
#
# Design (2026-06-07):
#   Adapters run as their own short jobs (60-min timeout). They do scrape + DB
#   ingest, never call Groq. Whatever they don't deterministically match goes to
#   PendingMatch.
#
#   A single combined `resolvers` job runs daily at 04:00 UTC (after all
#   adapters), processes every chain's PendingMatch queue sequentially, and has
#   a 350-min budget (max GH Actions allows is 360). Steady-state most rows are
#   cache hits so the job finishes in minutes; the budget is for first-day /
#   catch-up backfills.
#
#   The old design (adapter + resolver chained in one 90-min job) bit us on
#   2026-06-06/07 when a 5,134-row mymarket first-run resolver couldn't finish
#   inside the timeout — the whole job got cancelled and tomorrow's adapter
#   then re-ingested the same rows. Splitting makes adapters cheap-and-fast and
#   gives the resolver room to chew through backlog independently.
#
# Masoutis offers moved HERE from Vercel cron (2026-07-06): the leaflet run
# (~3k items, ~10-12 min) exceeds Vercel's 300s maxDuration and died mid-run
# every Thursday without ever writing an IngestRun row — the web cron survived
# only because 500-ish items fit the budget. GH has no such cap. The cron
# route (/api/cron/scrape-masoutis) still works as a manual refresh endpoint.
#
# pipeline-health also fires from here (08:00 UTC) for the same reason: its
# Vercel cron was part of the same unreliable set, which is how the leaflet
# feed sat stale for 10 days without an alarm. curl -f makes a failing
# watchdog itself turn the workflow red (watchdog for the watchdog).

on:
  schedule:
    - cron: '0 0 * * *'   # daily 00:00 UTC — My Market offers
    - cron: '0 1 * * *'   # daily 01:00 UTC — Sklavenitis offers
    - cron: '0 2 * * *'   # daily 02:00 UTC — Kritikos offers
    - cron: '30 2 * * *'  # daily 02:30 UTC — Bazaar offers
    - cron: '0 3 * * *'   # daily 03:00 UTC — AB offers
    - cron: '30 3 * * *'  # daily 03:30 UTC — Masoutis web offers (site API)
    - cron: '0 4 * * *'   # daily 04:00 UTC — Combined LLM resolver (all chains)
    - cron: '0 3 * * 4'   # weekly Thu 03:00 UTC — Masoutis leaflet offers (site API)
    - cron: '0 8 * * *'   # daily 08:00 UTC — pipeline-health watchdog (staleness alarm)
    - cron: '0 6 * * 4'   # weekly Thu 06:00 UTC — Lidl offers (vision OCR over leaflet)
    - cron: '30 3 * * 0'  # weekly Sun 03:30 UTC — Lidl catalog (e-shop grid)
    - cron: '30 4 * * 0'  # weekly Sun 04:30 UTC — AB full catalog (CATEGORY walk)
    - cron: '0 5 * * 0'   # weekly Sun 05:00 UTC — Sklavenitis Wolt barcode enrichment
    - cron: '30 5 * * 0'  # weekly Sun 05:30 UTC — My Market Wolt barcode enrichment
    - cron: '0 6 * * 0'   # weekly Sun 06:00 UTC — Kritikos canonical (catalog refresh)
    - cron: '30 6 * * 0'  # weekly Sun 06:30 UTC — Masoutis full catalog (site API)
    - cron: '0 7 * * 0'   # weekly Sun 07:00 UTC — Sklavenitis full catalog (category walk, needs PROXY_URL)
    - cron: '30 7 * * 0'  # weekly Sun 07:30 UTC — Bazaar full catalog (OpenCart category walk)
  workflow_dispatch:
    inputs:
      chain:
        description: 'Which chain to run'
        required: true
        type: choice
        options:
          - kritikos-offers
          - bazaar-offers
          - bazaar-catalog
          - bazaar-resolver-only
          - ab-offers
          - ab-catalog
          - ab-catalog-probe
          - sklavenitis-offers-probe
          - sklavenitis-offers
          - mymarket-offers
          - lidl-offers
          - lidl-catalog
          - resolvers-all
          - ab-resolver-only
          - sklavenitis-resolver-only
          - mymarket-resolver-only
          - masoutis-resolver-only
          - masoutis-offers
          - masoutis-leaflet
          - pipeline-health
          - lidl-resolver-only
          - mymarket-canonical
          - sklavenitis-canonical
          - kritikos-canonical
          - masoutis-catalog
          - sklavenitis-catalog

permissions:
  contents: read

concurrency:
  group: scrape-${{ github.workflow }}-${{ github.event.schedule || github.event.inputs.chain || github.run_id }}
  cancel-in-progress: false

# Opt into Node 24 for the actions themselves (silences the deprecation
# warning about checkout/setup-node running on Node 20 internally).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # Image mirror → Cloudflare R2 (10 GB free + free egress). When these secrets
  # are set the mirror prefers R2 over Supabase Storage automatically (see
  # src/scripts/lib/mirror-images.mjs resolveMirrorBackend). Empty → Supabase
  # fallback / no-op. Applies to every mirror step in this workflow.
  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}

jobs:
  kritikos-offers:
    if: github.event.schedule == '0 2 * * *' || github.event.inputs.chain == 'kritikos-offers'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/adapters/kritikos.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          PACE_MS: '750'
          JITTER_MS: '350'
          # Phase 9 pilot: also snapshot the full catalog's shelf prices
          # (kind='normal') for the price baseline. Kritikos already fetches
          # every product to find offers, so this is free + barcode-matched.
          BASELINE: '1'
          # Self-host offer images on the Supabase mirror (resilience). Kritikos
          # S3 isn't IP-blocked, so no proxy needed. Without these the run still
          # works — images just stay on S3 and the report warns.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  ab-offers:
    if: github.event.schedule == '0 3 * * *' || github.event.inputs.chain == 'ab-offers'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Run AB adapter
        run: node src/scripts/adapters/ab.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PACE_MS: '900'
          JITTER_MS: '500'

  sklavenitis-offers:
    if: github.event.schedule == '0 1 * * *' || github.event.inputs.chain == 'sklavenitis-offers'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Run Sklavenitis adapter
        run: node src/scripts/adapters/sklavenitis.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REQUIRE_PROXY: '1'
          PACE_MS: '4000'
          JITTER_MS: '1500'
          # sklavenitis.gr (Akamai) 403s GitHub's datacenter IPs — route the
          # scrape + image downloads through a residential proxy. Without the
          # secret the adapter no-ops the proxy and 403s as before (set it to
          # make the daily run autonomous). See src/scripts/lib/proxy-fetch.mjs.
          PROXY_URL: ${{ secrets.PROXY_URL }}

  sklavenitis-offers-probe:
    if: github.event.inputs.chain == 'sklavenitis-offers-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Probe Sklavenitis adapter safely
        run: node src/scripts/adapters/sklavenitis.mjs
        env:
          DRY_RUN: '1'
          ALLOW_PARTIAL_DRY_RUN: '1'
          LIMIT: '24'
          MAX_PAGES: '1'
          PACE_MS: '3000'
          JITTER_MS: '1000'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          # Intentionally no PROXY_URL: this tests whether GitHub's direct IP is
          # currently served. One dry-run page only; no writes/deactivation.

  bazaar-offers:
    # Daily 02:30 UTC + manual. Scrapes bazaar-online.gr/prosfores (OpenCart,
    # server-rendered). Bazaar embeds the GTIN in the image filename, so most
    # offers barcode-match the canonical catalog directly. Bazaar throttles
    # bursts → slow pacing.
    if: github.event.schedule == '30 2 * * *' || github.event.inputs.chain == 'bazaar-offers'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Run Bazaar adapter
        run: node src/scripts/adapters/bazaar.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PACE_MS: '2000'
          JITTER_MS: '1000'

  bazaar-catalog:
    # Weekly Sun 07:30 UTC + manual. Walks bazaar-online.gr's 16 OpenCart
    # departments (?page=N&limit=100) into barcode/SKU-keyed Products +
    # kind='normal' shelf-price baselines. On-offer cards skip the baseline.
    if: github.event.schedule == '30 7 * * 0' || github.event.inputs.chain == 'bazaar-catalog'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/bazaar-catalog.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          PACE_MS: '2000'
          JITTER_MS: '1000'
      - name: Self-host Bazaar catalog images
        continue-on-error: true
        run: node src/scripts/mirror-catalog.mjs
        env:
          CHAIN: bazaar
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MIRROR_MAX_NEW: '2500'
          MIRROR_CONCURRENCY: '3'
          QUERY_LIMIT: '4000'

  bazaar-resolver-only:
    if: github.event.inputs.chain == 'bazaar-resolver-only'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: bazaar
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  mymarket-offers:
    if: github.event.schedule == '0 0 * * *' || github.event.inputs.chain == 'mymarket-offers'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Run My Market adapter
        run: node src/scripts/adapters/mymarket.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PACE_MS: '1200'
          JITTER_MS: '600'

  resolvers:
    # Daily 04:00 UTC + manual `resolvers-all`. Walks every chain's PendingMatch
    # queue sequentially. continue-on-error so one stuck chain doesn't block
    # the rest. 350-min budget for first-day backfills; steady-state takes < 5 min.
    if: github.event.schedule == '0 4 * * *' || github.event.inputs.chain == 'resolvers-all'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Resolve AB pending
        continue-on-error: true
        run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: ab
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Resolve Sklavenitis pending
        continue-on-error: true
        run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: sklavenitis
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Resolve Bazaar pending
        continue-on-error: true
        run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: bazaar
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Resolve My Market pending
        continue-on-error: true
        run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: mymarket
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Resolve Masoutis pending (web)
        continue-on-error: true
        run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: masoutis
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Resolve Masoutis pending (leaflet)
        continue-on-error: true
        run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: masoutis
          SOURCE: leaflet
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Resolve Lidl pending (leaflet)
        continue-on-error: true
        run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: lidl
          SOURCE: leaflet
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Recompute price verdicts (honest "good deal" card badges)
        # Each new daily snapshot can flip an offer's verdict (e.g. a product
        # reaching its 3rd point becomes eligible). Idempotent. Runs BEFORE the
        # hotScore pass because hotness folds the verdict in (good deals rise,
        # over-priced ones sink). See src/lib/price-verdict.ts.
        continue-on-error: true
        run: node src/scripts/recompute-price-verdicts.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
      - name: Recompute hotScore (default-sort ranking)
        # Runs last so scores reflect every Discount the resolvers just wrote,
        # fresh price verdicts, the day's recent-window clicks/list-adds, and
        # recency decay. Authoritative over per-write estimates. See
        # src/lib/hotness.ts.
        continue-on-error: true
        run: node src/scripts/recompute-hotness.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
      - name: Recompute comparison counts (card «Τιμές σε N καταστήματα» chips)
        # After the resolvers so counts reflect the productIds they just
        # linked. Precompute twin of get-price-comparison — see
        # src/lib/comparison-count.ts.
        continue-on-error: true
        run: node src/scripts/recompute-comparison-counts.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  ab-catalog:
    # Weekly Sun 04:30 UTC + manual. Walks AB's ~14 root categories via the
    # ProductList CATEGORY listing → SKU-keyed Products + shelf-price baselines
    # (+ self-hosted images). Auto-links AB offers as SKU mappings fill in.
    if: github.event.schedule == '30 4 * * 0' || github.event.inputs.chain == 'ab-catalog'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/ab-catalog.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  ab-catalog-probe:
    # One-shot discovery (manual only): what AB GraphQL listing type returns the
    # full catalog (vs promos)? Logs only, no DB. See probe-ab-catalog.mjs.
    if: github.event.inputs.chain == 'ab-catalog-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: node src/scripts/probe-ab-catalog.mjs

  ab-resolver-only:
    if: github.event.inputs.chain == 'ab-resolver-only'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: ab
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  sklavenitis-resolver-only:
    if: github.event.inputs.chain == 'sklavenitis-resolver-only'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: sklavenitis
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  mymarket-resolver-only:
    if: github.event.inputs.chain == 'mymarket-resolver-only'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: mymarket
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  masoutis-resolver-only:
    if: github.event.inputs.chain == 'masoutis-resolver-only'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: masoutis
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  masoutis-offers:
    # Daily 03:30 UTC + manual. Moved from the Vercel cron (2026-07-06) so both
    # masoutis feeds live where every other chain runs. Same site API the weekly
    # masoutis-catalog job has hit from GH runners for weeks (not IP-blocked).
    if: github.event.schedule == '30 3 * * *' || github.event.inputs.chain == 'masoutis-offers'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/adapters/masoutis.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          # Offer-image mirror (masoutis promo URLs rotate). R2 preferred via
          # workflow-level env; Supabase fallback. Missing creds → warn, keep chain URLs.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  masoutis-leaflet:
    # Weekly Thu 03:00 UTC + manual. The leaflet feed (~3k items, ~10-12 min)
    # NEVER fit Vercel's 300s maxDuration — it died mid-run every Thursday
    # before writing an IngestRun row, which is why the feed silently went
    # stale. SOURCE=leaflet is load-bearing: ingest dedupes and deactivates
    # per (chain, source); mislabeling would wipe the web rows.
    if: github.event.schedule == '0 3 * * 4' || github.event.inputs.chain == 'masoutis-leaflet'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/adapters/masoutis.mjs
        env:
          SOURCE: 'leaflet'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  pipeline-health:
    # Daily 08:00 UTC + manual. Pings the staleness-watchdog route. Lives here
    # (not Vercel cron) so a dead watchdog is a visibly red workflow run.
    if: github.event.schedule == '0 8 * * *' || github.event.inputs.chain == 'pipeline-health'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping pipeline-health route
        run: |
          curl -fsS --max-time 120 \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://prosforespantou.gr/api/cron/pipeline-health
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  lidl-offers:
    # Weekly Thu 06:00 UTC + manual `lidl-offers`. Reads the current weekly deals
    # from lidl-hellas.gr's structured e-shop search API (clean names/prices/dates/
    # photos — no OCR). Discounted items only, each shown with a badge. Runs free
    # and fast (~1–2 min); no Groq needed.
    if: github.event.schedule == '0 6 * * 4' || github.event.inputs.chain == 'lidl-offers'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Run Lidl adapter
        run: node src/scripts/adapters/lidl.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          PACE_MS: '500'

  lidl-catalog:
    # Weekly Sun 03:30 UTC + manual. Walks Lidl's e-shop categories via the search
    # API (sitemap → /q/api/search, paged to completion) → SKU-keyed Products +
    # shelf-price baselines for the full assortment. Complements the offers adapter.
    if: github.event.schedule == '30 3 * * 0' || github.event.inputs.chain == 'lidl-catalog'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/lidl-catalog.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          PACE_MS: '500'

  lidl-resolver-only:
    if: github.event.inputs.chain == 'lidl-resolver-only'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: lidl
          SOURCE: leaflet
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  mymarket-canonical:
    if: github.event.schedule == '30 5 * * 0' || github.event.inputs.chain == 'mymarket-canonical'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/wolt-canonical-scraper.mjs my-market mymarket
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          PACE_MS: '1000'
          JITTER_MS: '500'
          WOLT_BASELINE: '0'
      - name: My Market full catalog (site listing -> Product + shelf-price baseline)
        # Walks mymarket.gr's product departments from /sitemap/categories-tree,
        # not /offers. Normal cards write shelf-price baselines; current offer
        # cards only create/keep the SKU mapping so promo prices are not stored
        # as normal shelf prices. Wolt step above still adds GTINs for the
        # subset it covers. See src/scripts/mymarket-catalog.mjs.
        continue-on-error: true
        run: node src/scripts/mymarket-catalog.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          PACE_MS: '1200'
          JITTER_MS: '600'

  sklavenitis-canonical:
    if: github.event.schedule == '0 5 * * 0' || github.event.inputs.chain == 'sklavenitis-canonical'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/wolt-canonical-scraper.mjs sklavenitis-gerakas sklavenitis
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          PACE_MS: '1000'
          JITTER_MS: '500'
          WOLT_BASELINE: '0'

  kritikos-canonical:
    if: github.event.schedule == '0 6 * * 0' || github.event.inputs.chain == 'kritikos-canonical'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/kritikos-canonical-scraper.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          PACE_MS: '750'
          JITTER_MS: '350'
      - name: Self-host Kritikos catalog images (non-offer Product pics)
        # Mirrors Product.imageUrl (the full browsable catalog) to Supabase so
        # pictures survive a CDN block / S3 key rotation. Incremental: caps fresh
        # downloads per run, HEAD-skips already-mirrored files. Seed the initial
        # ~8.7k locally for speed; this keeps it topped up weekly. No-op without
        # the Supabase creds. See src/scripts/mirror-catalog.mjs.
        continue-on-error: true
        run: node src/scripts/mirror-catalog.mjs
        env:
          CHAIN: kritikos
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MIRROR_MAX_NEW: '2500'
          MIRROR_CONCURRENCY: '3'
          QUERY_LIMIT: '4000'

  masoutis-catalog:
    # Weekly Sun 06:30 UTC + manual. Walks Masoutis' own e-shop category API
    # (GetScanNShopMenuAllLevelsAutoScheduler -> category pages) into
    # SKU-keyed Products + normal shelf-price baselines. Current official web
    # and leaflet offer Itemcodes are excluded from normal baselines so MONO
    # promos don't poison the reference price.
    if: github.event.schedule == '30 6 * * 0' || github.event.inputs.chain == 'masoutis-catalog'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/masoutis-catalog.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          PACE_MS: '900'
          JITTER_MS: '400'
          MAX_OFFER_PAGES: '80'
      - name: Self-host Masoutis catalog images
        continue-on-error: true
        run: node src/scripts/mirror-catalog.mjs
        env:
          CHAIN: masoutis
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MIRROR_MAX_NEW: '2500'
          MIRROR_CONCURRENCY: '3'
          QUERY_LIMIT: '4000'

  sklavenitis-catalog:
    # Weekly Sun 07:00 UTC + manual. Walks sklavenitis.gr's real category tree
    # (/katigories/ → ~144 leaf categories, ?pg=N to completion) into SKU-keyed
    # Products + kind='normal' shelf-price baselines for the FULL official
    # assortment — the only chain previously offers-only. On-offer cards
    # (main-price--previous) keep the Product + SKU mapping but skip the baseline
    # so a promo price is never stored as a normal price. See
    # src/scripts/sklavenitis-catalog.mjs.
    #
    # REQUIRE_PROXY=1: sklavenitis.gr (Akamai) 403s GitHub's datacenter IPs, so
    # without PROXY_URL this job no-ops (exit 0) rather than hammering a block.
    # Set the PROXY_URL secret to make it autonomous; until then run it locally
    # from a residential IP.
    if: github.event.schedule == '0 7 * * 0' || github.event.inputs.chain == 'sklavenitis-catalog'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/sklavenitis-catalog.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REQUIRE_PROXY: '1'
          PROXY_URL: ${{ secrets.PROXY_URL }}
          PACE_MS: '4000'
          JITTER_MS: '1500'
      - name: Self-host Sklavenitis catalog images
        continue-on-error: true
        run: node src/scripts/mirror-catalog.mjs
        env:
          CHAIN: sklavenitis
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          MIRROR_MAX_NEW: '2500'
          MIRROR_CONCURRENCY: '3'
          QUERY_LIMIT: '4000'

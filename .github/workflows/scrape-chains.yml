name: Scrape supermarket chains

# Runs the heavier adapters that exceed Vercel's 300s serverless timeout.
# Each schedule entry below maps to one job via `if: github.event.schedule`.
# Manual triggers via workflow_dispatch let us re-run any chain on demand.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DATABASE_URL   — Supabase pooler URL (port 6543, pgbouncer)
#   DIRECT_URL     — Direct Postgres URL (port 5432) for migrations
#   GROQ_API_KEY   — Groq Cloud key for LLM resolver
#
# Optional repo secrets:
#   SUPABASE_URL               — https://<ref>.supabase.co (project API URL)
#   SUPABASE_SERVICE_ROLE_KEY  — for mirroring AB product images to Supabase
#                                Storage (www.ab.gr 403s off-site fetches; see
#                                src/scripts/lib/mirror-images.mjs). Without
#                                these the AB run still works — images just
#                                stay broken and the run report warns.
#   PROXY_URL                  — residential proxy (http://user:pass@host:port)
#                                for chains whose host IP-blocks GitHub's
#                                datacenter ranges. Σκλαβενίτης (Akamai) needs
#                                it; without it the daily sklavenitis-offers job
#                                403s. See src/scripts/lib/proxy-fetch.mjs.
#
# Design (2026-06-07):
#   Adapters run as their own short jobs (60-min timeout). They do scrape + DB
#   ingest, never call Groq. Whatever they don't deterministically match goes to
#   PendingMatch.
#
#   A single combined `resolvers` job runs daily at 04:00 UTC (after all
#   adapters), processes every chain's PendingMatch queue sequentially, and has
#   a 350-min budget (max GH Actions allows is 360). Steady-state most rows are
#   cache hits so the job finishes in minutes; the budget is for first-day /
#   catch-up backfills.
#
#   The old design (adapter + resolver chained in one 90-min job) bit us on
#   2026-06-06/07 when a 5,134-row mymarket first-run resolver couldn't finish
#   inside the timeout — the whole job got cancelled and tomorrow's adapter
#   then re-ingested the same rows. Splitting makes adapters cheap-and-fast and
#   gives the resolver room to chew through backlog independently.
#
# Masoutis is NOT here — its adapter fits in Vercel's timeout and runs as a
# cron route, then its PendingMatch rows are picked up by this resolver job.

on:
  schedule:
    - cron: '0 0 * * *'   # daily 00:00 UTC — My Market offers
    - cron: '0 1 * * *'   # daily 01:00 UTC — Sklavenitis offers
    - cron: '0 2 * * *'   # daily 02:00 UTC — Kritikos offers
    - cron: '0 3 * * *'   # daily 03:00 UTC — AB offers
    - cron: '0 4 * * *'   # daily 04:00 UTC — Combined LLM resolver (all chains)
    - cron: '0 6 * * 4'   # weekly Thu 06:00 UTC — Lidl offers (vision OCR over leaflet)
    - cron: '30 3 * * 0'  # weekly Sun 03:30 UTC — Lidl catalog (e-shop grid)
    - cron: '30 4 * * 0'  # weekly Sun 04:30 UTC — AB full catalog (CATEGORY walk)
    - cron: '0 5 * * 0'   # weekly Sun 05:00 UTC — Sklavenitis canonical (Wolt)
    - cron: '30 5 * * 0'  # weekly Sun 05:30 UTC — My Market canonical (Wolt)
    - cron: '0 6 * * 0'   # weekly Sun 06:00 UTC — Kritikos canonical (catalog refresh)
  workflow_dispatch:
    inputs:
      chain:
        description: 'Which chain to run'
        required: true
        type: choice
        options:
          - kritikos-offers
          - ab-offers
          - ab-catalog
          - ab-catalog-probe
          - sklavenitis-offers
          - mymarket-offers
          - lidl-offers
          - lidl-catalog
          - resolvers-all
          - ab-resolver-only
          - sklavenitis-resolver-only
          - mymarket-resolver-only
          - masoutis-resolver-only
          - lidl-resolver-only
          - mymarket-canonical
          - sklavenitis-canonical
          - kritikos-canonical

permissions:
  contents: read

# Opt into Node 24 for the actions themselves (silences the deprecation
# warning about checkout/setup-node running on Node 20 internally).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  kritikos-offers:
    if: github.event.schedule == '0 2 * * *' || github.event.inputs.chain == 'kritikos-offers'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/adapters/kritikos.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          PACE_MS: '150'
          # Phase 9 pilot: also snapshot the full catalog's shelf prices
          # (kind='normal') for the price baseline. Kritikos already fetches
          # every product to find offers, so this is free + barcode-matched.
          BASELINE: '1'
          # Self-host offer images on the Supabase mirror (resilience). Kritikos
          # S3 isn't IP-blocked, so no proxy needed. Without these the run still
          # works — images just stay on S3 and the report warns.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  ab-offers:
    if: github.event.schedule == '0 3 * * *' || github.event.inputs.chain == 'ab-offers'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Run AB adapter
        run: node src/scripts/adapters/ab.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  sklavenitis-offers:
    if: github.event.schedule == '0 1 * * *' || github.event.inputs.chain == 'sklavenitis-offers'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Run Sklavenitis adapter
        run: node src/scripts/adapters/sklavenitis.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # sklavenitis.gr (Akamai) 403s GitHub's datacenter IPs — route the
          # scrape + image downloads through a residential proxy. Without the
          # secret the adapter no-ops the proxy and 403s as before (set it to
          # make the daily run autonomous). See src/scripts/lib/proxy-fetch.mjs.
          PROXY_URL: ${{ secrets.PROXY_URL }}

  mymarket-offers:
    if: github.event.schedule == '0 0 * * *' || github.event.inputs.chain == 'mymarket-offers'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Run My Market adapter
        run: node src/scripts/adapters/mymarket.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PACE_MS: '600'

  resolvers:
    # Daily 04:00 UTC + manual `resolvers-all`. Walks every chain's PendingMatch
    # queue sequentially. continue-on-error so one stuck chain doesn't block
    # the rest. 350-min budget for first-day backfills; steady-state takes < 5 min.
    if: github.event.schedule == '0 4 * * *' || github.event.inputs.chain == 'resolvers-all'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Resolve AB pending
        continue-on-error: true
        run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: ab
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Resolve Sklavenitis pending
        continue-on-error: true
        run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: sklavenitis
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Resolve My Market pending
        continue-on-error: true
        run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: mymarket
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Resolve Masoutis pending (web)
        continue-on-error: true
        run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: masoutis
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Resolve Masoutis pending (leaflet)
        continue-on-error: true
        run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: masoutis
          SOURCE: leaflet
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Resolve Lidl pending (leaflet)
        continue-on-error: true
        run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: lidl
          SOURCE: leaflet
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Recompute price verdicts (honest "good deal" card badges)
        # Each new daily snapshot can flip an offer's verdict (e.g. a product
        # reaching its 3rd point becomes eligible). Idempotent. Runs BEFORE the
        # hotScore pass because hotness folds the verdict in (good deals rise,
        # over-priced ones sink). See src/lib/price-verdict.ts.
        continue-on-error: true
        run: node src/scripts/recompute-price-verdicts.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
      - name: Recompute hotScore (default-sort ranking)
        # Runs last so scores reflect every Discount the resolvers just wrote,
        # fresh price verdicts, the day's recent-window clicks/list-adds, and
        # recency decay. Authoritative over per-write estimates. See
        # src/lib/hotness.ts.
        continue-on-error: true
        run: node src/scripts/recompute-hotness.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  ab-catalog:
    # Weekly Sun 04:30 UTC + manual. Walks AB's ~14 root categories via the
    # ProductList CATEGORY listing → SKU-keyed Products + shelf-price baselines
    # (+ self-hosted images). Auto-links AB offers as SKU mappings fill in.
    if: github.event.schedule == '30 4 * * 0' || github.event.inputs.chain == 'ab-catalog'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/ab-catalog.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  ab-catalog-probe:
    # One-shot discovery (manual only): what AB GraphQL listing type returns the
    # full catalog (vs promos)? Logs only, no DB. See probe-ab-catalog.mjs.
    if: github.event.inputs.chain == 'ab-catalog-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: node src/scripts/probe-ab-catalog.mjs

  ab-resolver-only:
    if: github.event.inputs.chain == 'ab-resolver-only'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: ab
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  sklavenitis-resolver-only:
    if: github.event.inputs.chain == 'sklavenitis-resolver-only'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: sklavenitis
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  mymarket-resolver-only:
    if: github.event.inputs.chain == 'mymarket-resolver-only'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: mymarket
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  masoutis-resolver-only:
    if: github.event.inputs.chain == 'masoutis-resolver-only'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: masoutis
          SOURCE: web
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  lidl-offers:
    # Weekly Thu 06:00 UTC + manual `lidl-offers`. Reads the current weekly deals
    # from lidl-hellas.gr's structured e-shop search API (clean names/prices/dates/
    # photos — no OCR). Discounted items only, each shown with a badge. Runs free
    # and fast (~1–2 min); no Groq needed.
    if: github.event.schedule == '0 6 * * 4' || github.event.inputs.chain == 'lidl-offers'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Run Lidl adapter
        run: node src/scripts/adapters/lidl.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  lidl-catalog:
    # Weekly Sun 03:30 UTC + manual. Walks Lidl's e-shop categories via the search
    # API (sitemap → /q/api/search, paged to completion) → SKU-keyed Products +
    # shelf-price baselines for the full assortment. Complements the offers adapter.
    if: github.event.schedule == '30 3 * * 0' || github.event.inputs.chain == 'lidl-catalog'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/lidl-catalog.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  lidl-resolver-only:
    if: github.event.inputs.chain == 'lidl-resolver-only'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/resolve-pending-matches.mjs
        env:
          CHAIN: lidl
          SOURCE: leaflet
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  mymarket-canonical:
    if: github.event.schedule == '30 5 * * 0' || github.event.inputs.chain == 'mymarket-canonical'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/wolt-canonical-scraper.mjs my-market mymarket
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          PACE_MS: '200'
      - name: My Market full catalog (site listing → Product + shelf-price baseline)
        # mymarket.gr/offers paginates the WHOLE catalogue (~5.5k) offers-first;
        # this captures every product (SKU-keyed) so the catalog is complete and
        # future offers link instantly. Wolt step above still adds GTINs for the
        # subset it covers. See src/scripts/mymarket-catalog.mjs.
        continue-on-error: true
        run: node src/scripts/mymarket-catalog.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          PACE_MS: '600'

  sklavenitis-canonical:
    if: github.event.schedule == '0 5 * * 0' || github.event.inputs.chain == 'sklavenitis-canonical'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/wolt-canonical-scraper.mjs sklavenitis-gerakas sklavenitis
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          PACE_MS: '200'

  kritikos-canonical:
    if: github.event.schedule == '0 6 * * 0' || github.event.inputs.chain == 'kritikos-canonical'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/kritikos-canonical-scraper.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          PACE_MS: '150'
      - name: Self-host Kritikos catalog images (non-offer Product pics)
        # Mirrors Product.imageUrl (the full browsable catalog) to Supabase so
        # pictures survive a CDN block / S3 key rotation. Incremental: caps fresh
        # downloads per run, HEAD-skips already-mirrored files. Seed the initial
        # ~8.7k locally for speed; this keeps it topped up weekly. No-op without
        # the Supabase creds. See src/scripts/mirror-catalog.mjs.
        continue-on-error: true
        run: node src/scripts/mirror-catalog.mjs
        env:
          CHAIN: kritikos
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MIRROR_MAX_NEW: '2500'
          QUERY_LIMIT: '4000'

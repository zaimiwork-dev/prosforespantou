<!doctype html>
<html lang="el">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Προσφορές Παντού</title>
    <style>
      html, body { margin: 0; height: 100%; background: #fff; color: #111;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      .wrap { height: 100%; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 14px; text-align: center; padding: 24px; }
      .mark { font-size: 44px; font-weight: 800; letter-spacing: -1px; }
      .sub { color: #888; font-size: 15px; }
      .spin { width: 26px; height: 26px; border: 3px solid #eee; border-top-color: #e11d48;
        border-radius: 50%; animation: s 0.8s linear infinite; }
      @keyframes s { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Shown only as the offline/loading fallback; the native shell loads the
         live site (server.url) over this. -->
    <div class="wrap">
      <div class="mark">Π</div>
      <div class="spin"></div>
      <div class="sub">Προσφορές Παντού — σύνδεση…</div>
    </div>
  </body>
</html>
